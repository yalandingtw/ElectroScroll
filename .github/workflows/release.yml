name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.1"
        required: true
        default: "v0.1.1"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Package
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
          }

          .\scripts\package-release.ps1 -Version $version

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ElectroScroll ${{ env.RELEASE_TAG }}
          prerelease: true
          body: |
            ElectroScroll prototype release.

            This package contains a self-contained Windows x64 build, README files,
            and the MIT license.
          files: artifacts/ElectroScroll-*-win-x64.zip
